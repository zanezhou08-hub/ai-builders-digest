<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="{{ site.baseurl }}/">🦞 Daily Digest</a></h1>
            <p class="tagline">每日精选 AI 洞察与全球新闻</p>
            
            <!-- Tab Navigation -->
            <div class="tabs">
                <a href="{{ site.baseurl }}/" class="tab {% if page.section == 'home' %}active{% endif %}">首页</a>
                <a href="{{ site.baseurl }}/ai-builders/" class="tab {% if page.section == 'ai' %}active{% endif %}">🤖 AI Builders</a>
                <a href="{{ site.baseurl }}/news/" class="tab {% if page.section == 'news' %}active{% endif %}">📰 新闻</a>
            </div>
        </header>

        <main>
            {{ content }}
        </main>

        <footer>
            <p>Generated through <a href="https://github.com/zarazhangrui/follow-builders">Follow Builders</a> & <a href="#">News Aggregator</a></p>
        </footer>
    </div>
</body>
</html>
